<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyramid Card Deck</title>
<style>
  :root {
    --card-w: 75px;
    --card-h: 105px;
    --card-bg: #fdf8e8;
    --card-border: #d4c88a;
    --card-radius: 8px;
    --red: #c0392b;
    --black: #1a1a1a;
    --gold: #c9a84c;
    --bg: #1e2b10;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    padding: 30px 16px;
    color: #fff;
  }
  h2 {
    text-align: center;
    color: var(--gold);
    font-size: 18px;
    letter-spacing: 3px;
    margin-bottom: 28px;
    text-transform: uppercase;
    font-weight: normal;
  }
  .section-label {
    text-align: center;
    color: #7a8a5a;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 18px 0 10px;
  }
  .suits-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  /* CARD FACE */
  .card {
    width: var(--card-w);
    height: var(--card-h);
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: var(--card-radius);
    position: relative;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.45);
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.55);
  }
  .card.selected {
    border: 2px solid #d4a820;
    box-shadow: 0 0 0 2px #d4a820, 0 0 16px 4px rgba(212,168,32,0.55);
    transform: translateY(-5px);
  }
  .card-rank {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    font-family: 'Georgia', serif;
  }
  .card-suit {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -45%);
    font-size: 44px;
    line-height: 1;
    pointer-events: none;
  }
  .red .card-rank, .red .card-suit { color: var(--red); }
  .black .card-rank, .black .card-suit { color: var(--black); }

  /* CARD BACK — Variant 2 · Radial Glow */
  .card-back {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--card-radius);
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.55);
    background: radial-gradient(ellipse at 50% 40%, #1d7a52 0%, #0a4229 70%);
    border: 2px solid #26a36b;
    cursor: default;
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 65%);
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 5px;
    box-shadow: inset 0 0 8px rgba(255,255,255,0.06);
  }
  .card-back-pip {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    color: rgba(200,255,220,0.3);
    text-shadow: 0 0 10px rgba(100,255,160,0.4);
    z-index: 1;
  }

  .demo-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .hint {
    text-align: center;
    color: #8a9a6a;
    font-size: 11px;
    letter-spacing: 1px;
    margin-top: 6px;
    margin-bottom: 30px;
  }
</style>
</head>
<body>

<h2>Pyramid · 36 Cards</h2>

<div class="section-label">Demo Hand</div>
<div class="demo-row" id="demo"></div>
<div class="hint">bordered / glowing = selectable pair</div>

<div class="section-label">♥ Hearts</div>
<div class="suits-row" id="hearts"></div>

<div class="section-label">♦ Diamonds</div>
<div class="suits-row" id="diamonds"></div>

<div class="section-label">♣ Clubs</div>
<div class="suits-row" id="clubs"></div>

<div class="section-label">♠ Spades</div>
<div class="suits-row" id="spades"></div>

<div class="section-label">Card Backs</div>
<div class="suits-row" id="backs"></div>

<script>
const RANKS = ['6','7','8','9','10','J','Q','K','A'];

function makeCard(rank, sym, colorClass, selected) {
  const div = document.createElement('div');
  div.className = 'card ' + colorClass + (selected ? ' selected' : '');
  div.innerHTML = '<span class="card-rank">' + rank + '<\/span><span class="card-suit">' + sym + '<\/span>';
  div.addEventListener('click', () => div.classList.toggle('selected'));
  return div;
}

function makeBack() {
  const div = document.createElement('div');
  div.className = 'card-back';
  div.innerHTML = '<div class="card-back-pip">🔺<\/div>';
  return div;
}

const demoData = [
  {rank:'K', sym:'♥', color:'red',   sel:false},
  {rank:'Q', sym:'♦', color:'red',   sel:false},
  {rank:'J', sym:'♣', color:'black', sel:false},
  {rank:'9', sym:'♥', color:'red',   sel:true},
  {rank:'9', sym:'♠', color:'black', sel:true},
];
const demoEl = document.getElementById('demo');
demoData.forEach(c => demoEl.appendChild(makeCard(c.rank, c.sym, c.color, c.sel)));

const suits = [
  {id:'hearts',   sym:'♥', color:'red'},
  {id:'diamonds', sym:'♦', color:'red'},
  {id:'clubs',    sym:'♣', color:'black'},
  {id:'spades',   sym:'♠', color:'black'},
];
suits.forEach(({id, sym, color}) => {
  const el = document.getElementById(id);
  RANKS.forEach(rank => el.appendChild(makeCard(rank, sym, color, false)));
});

const backsEl = document.getElementById('backs');
for (let i = 0; i < 9; i++) backsEl.appendChild(makeBack());
</script>
</body>
</html>
